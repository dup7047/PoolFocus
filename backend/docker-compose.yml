services:
  postgres:
    image: postgres:16-alpine
    container_name: poolfocus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: poolfocus
      POSTGRES_PASSWORD: poolfocus
      POSTGRES_DB: poolfocus_dev
    ports:
      - "5432:5432"
    volumes:
      - poolfocus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poolfocus -d poolfocus_dev"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  poolfocus_pgdata:
